<g class="edge-label" data-from="Idle" data-to="Processing" data-label="Start">
  <rect x="89.70916666666666" y="195.9" width="40.222" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="109.82016666666667" y="211.05" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Start</text>
