  <rect x="129.76116666666667" y="116" width="62.69799999999999" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="161.11016666666666" y="134.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Idle</text>
</g>
<g class="node" data-id="Processing" data-label="Processing" data-shape="rounded">
  <rect x="54.40716666666666" y="269.20000000000005" width="111.604" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
